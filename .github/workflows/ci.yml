name: CI - Testes Automatizados

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # BACKEND PYTHON
  # ─────────────────────────────────────────────
  test-svc-auth:
    name: "Testes svc-auth"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          pip install fastapi==0.110.0 sqlalchemy==2.0.29 pydantic==2.6.4 \
                      python-jose[cryptography]==3.3.0 passlib[bcrypt] bcrypt \
                      pytest==8.1.1 pytest-asyncio==0.23.6 httpx==0.27.0 \
                      pika==1.3.2 aiosqlite
      - name: Rodar testes
        working-directory: svc-auth
        env:
          DATABASE_URL: "sqlite:///./test_auth.db"
          JWT_SECRET: "chave_secreta_jwt_super_segura"
        run: pytest tests/ -v

  test-svc-catalogo:
    name: "Testes svc-catalogo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          pip install fastapi==0.110.0 sqlalchemy==2.0.29 pydantic==2.6.4 \
                      python-jose[cryptography]==3.3.0 passlib[bcrypt] bcrypt \
                      pytest==8.1.1 pytest-asyncio==0.23.6 httpx==0.27.0 \
                      python-multipart minio aiosqlite
      - name: Rodar testes
        working-directory: svc-catalogo
        env:
          DATABASE_URL: "sqlite:///./test_catalogo.db"
          JWT_SECRET: "chave_secreta_jwt_super_segura"
          MINIO_ENDPOINT: "localhost:9000"
          MINIO_ACCESS_KEY: "test"
          MINIO_SECRET_KEY: "test"
        run: pytest tests/ -v

  test-svc-pedidos:
    name: "Testes svc-pedidos"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          pip install fastapi==0.110.0 sqlalchemy==2.0.29 pydantic==2.6.4 \
                      python-jose[cryptography]==3.3.0 passlib[bcrypt] bcrypt \
                      pytest==8.1.1 pytest-asyncio==0.23.6 httpx==0.27.0 \
                      pika==1.3.2 redis==5.0.3 aiosqlite
      - name: Rodar testes
        working-directory: svc-pedidos
        env:
          DATABASE_URL: "sqlite:///./test_pedidos.db"
          JWT_SECRET: "chave_secreta_jwt_super_segura"
          RABBITMQ_URL: "amqp://guest:guest@localhost:5672/"
          REDIS_URL: "redis://localhost:6379/0"
          CATALOGO_API_URL: "http://localhost:8001"
          LLM_API_KEY: "fake-key-for-tests"
        run: pytest tests/ -v

  # ─────────────────────────────────────────────
  # FRONTEND REACT
  # ─────────────────────────────────────────────
  test-mfe-shell:
    name: "Testes mfe-shell"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mfe-shell/package-lock.json
      - name: Instalar dependencias
        run: cd mfe-shell && npm install --legacy-peer-deps
      - name: Rodar testes
        run: cd mfe-shell && npm test -- --run

  test-mfe-pedidos:
    name: "Testes mfe-pedidos"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mfe-pedidos/package-lock.json
      - name: Instalar dependencias
        run: cd mfe-pedidos && npm install --legacy-peer-deps
      - name: Rodar testes
        run: cd mfe-pedidos && npm test -- --run
